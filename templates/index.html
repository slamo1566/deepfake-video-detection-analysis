<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Deepfake Detection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        * {
            font-family: 'Poppins', sans-serif;
        }

        body {

            background: linear-gradient(135deg, #0f172a, #1e293b);

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            color: white;

            padding: 20px;
        }

        .upload-container {

            width: 100%;

            max-width: 650px;

            background: rgba(255, 255, 255, 0.08);

            backdrop-filter: blur(10px);

            border-radius: 25px;

            padding: 40px;

            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .title {

            font-size: 3rem;

            font-weight: 700;

            text-align: center;

            margin-bottom: 10px;
        }

        .subtitle {

            text-align: center;

            color: #cbd5e1;

            margin-bottom: 35px;
        }

        .upload-box {

            border: 2px dashed rgba(255,255,255,0.3);

            border-radius: 20px;

            padding: 60px 20px;

            text-align: center;

            cursor: pointer;

            transition: 0.3s ease;

            background-color: rgba(255,255,255,0.03);
        }

        .upload-box:hover {

            border-color: #38bdf8;

            background-color: rgba(56,189,248,0.08);
        }

        .upload-icon {

            font-size: 70px;

            margin-bottom: 15px;
        }

        .upload-text {

            font-size: 1.2rem;
        }

        input[type="file"] {

            display: none;
        }

        .message {

            margin-bottom: 20px;

            padding: 15px;

            border-radius: 12px;

            text-align: center;

            font-weight: 500;
        }

        .error {

            background-color: rgba(239,68,68,0.2);

            color: #f87171;
        }

        .footer-text {

            text-align: center;

            margin-top: 25px;

            color: #94a3b8;
        }

    </style>

</head>

<body>

<div class="upload-container">

    <h1 class="title">
        Deepfake Detection
    </h1>

    <p class="subtitle">
        Upload a video to analyze whether it is REAL or FAKE
    </p>

    {% if error %}
        <div class="message error">
            {{ error }}
        </div>
    {% endif %}

    <form action="/upload"
          method="POST"
          enctype="multipart/form-data"
          id="uploadForm">

        <label for="videoInput"
               class="upload-box"
               id="uploadArea">

            <div class="upload-icon">
                🎥
            </div>

            <div class="upload-text">

                Drag & Drop your video here
                <br>
                or click to browse

            </div>

            <div class="mt-3 text-info">
                Accepted formats: MP4, AVI
            </div>

        </label>

        <input type="file"
               id="videoInput"
               name="video"
               accept=".mp4,.avi">

    </form>

    <div class="footer-text">
        AI-based Deepfake Video Detection System
    </div>

</div>

<script>

const videoInput =
    document.getElementById('videoInput');

const uploadArea =
    document.getElementById('uploadArea');

const uploadForm =
    document.getElementById('uploadForm');


// Open file explorer
uploadArea.onclick = function () {

    videoInput.click();

};


// Upload automatically after selection
videoInput.onchange = function () {

    if (videoInput.files.length > 0) {

        uploadForm.submit();

    }

};

</script>

</body>
</html>
